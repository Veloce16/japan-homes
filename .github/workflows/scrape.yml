name: Scrape Japan Real Estate

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:   # allows manual trigger from dashboard "Search Now" button

permissions:
  contents: write      # needed to commit listings.json back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Check out the repo (full history so we can commit)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Cache pip packages
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install Python dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 5. Install Playwright browsers (Chromium only)
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # 6. Run the scraper
      - name: Run scraper
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scraper.py

      # 7. Commit the updated listings.json files back to the repo
      #    so the GitHub Pages dashboard always shows fresh data
      - name: Commit updated listings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add listings.json docs/listings.json
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: update listings [skip ci]"
          git push
